<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro Neon Annihilator</title>
    <style>
        body { margin: 0; background: #020202; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(255, 0, 255, 0.3); }
        #ui { position: absolute; top: 10px; left: 10px; font-size: 20px; pointer-events: none; text-shadow: 0 0 5px #fff; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="scoreDisplay">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 500; canvas.height = 700;

        let score = 0, isGameOver = false, frame = 0;
        let player = { x: 230, y: 600, w: 40, h: 45, speed: 25 };
        let bullets = [], enemies = [], stars = [], particles = [], enemyBullets = [];

        // 배경 별 생성
        for(let i=0; i<150; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: Math.random()*0.5 + 0.2 });

        // 폭발 효과
        function createExplosion(x, y, color, count = 10) {
            for(let i=0; i<count; i++) {
                particles.push({ 
                    x, y, 
                    vx: (Math.random()-0.5)*8, 
                    vy: (Math.random()-0.5)*8, 
                    life: 20 + Math.random()*10, 
                    color: Math.random()>0.5 ? color : '#fff',
                    size: Math.random()*3 + 1
                });
            }
        }

        // --- 드로잉 함수들 (디테일 추가) ---
        function drawShip(x, y, color, isPlayer = false) {
            ctx.save();
            ctx.translate(x, y);
            
            // 네온 효과
            ctx.shadowBlur = isPlayer ? 20 : 10;
            ctx.shadowColor = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;

            if (isPlayer) {
                // 플레이어 우주선 디자인
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.moveTo(0, -20); // 코
                ctx.lineTo(15, 15); // 오른쪽 날개
                ctx.lineTo(5, 10);  // 오른쪽 엔진룸
                ctx.lineTo(-5, 10); // 왼쪽 엔진룸
                ctx.lineTo(-15, 15);// 왼쪽 날개
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 엔진 불꽃 (애니메이션)
                if(Math.random() > 0.3) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff0' : '#f50';
                    ctx.fillRect(-3, 10, 6, 10 + Math.random()*10);
                }
            } else {
                // 적 우주선 디자인 (약간 회전하는 느낌)
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.moveTo(0, 15);
                ctx.lineTo(15, -5);
                ctx.lineTo(5, -15);
                ctx.lineTo(-5, -15);
                ctx.lineTo(-15, -5);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // 적 내부 디테일
                ctx.fillStyle = color;
                ctx.fillRect(-5, -10, 10, 5);
            }
            ctx.restore();
        }

        window.addEventListener("keydown", (e) => {
            if(isGameOver) { if(e.code === 'Space') location.reload(); return; }
            if(e.code === 'ArrowLeft' && player.x > 30) player.x -= player.speed;
            if(e.code === 'ArrowRight' && player.x < canvas.width - 30) player.x += player.speed;
            if(e.code === 'Space') {
                bullets.push({ x: player.x, y: player.y - 25, w: 4, h: 15 });
                // 총알 발사 사운드 대신 작은 반동 파티클
                createExplosion(player.x, player.y-20, '#fff', 3);
            }
        });

        function update() {
            if(isGameOver) return;
            frame++;

            // 배경 이동
            stars.forEach(s => { s.y += s.speed; if(s.y > canvas.height) s.y = 0; });

            // 총알 이동
            bullets.forEach((b, i) => { b.y -= 12; if(b.y < -20) bullets.splice(i, 1); });

            // 적 생성 및 이동
            if(Math.random() < 0.035) {
                enemies.push({ x: 30 + Math.random() * (canvas.width-60), y: -50, w: 40, h: 40, speed: Math.random()*2 + 1, angle: 0 });
            }
            
            enemies.forEach((e, ei) => {
                e.y += e.speed;
                e.angle += 0.05; // 적이 약간 흔들리게 함
                
                // 플레이어와 적 충돌 체크
                if(Math.hypot(e.x - player.x, e.y - player.y) < 35) {
                    isGameOver = true;
                    createExplosion(player.x, player.y, '#ff00ff', 30);
                    createExplosion(e.x, e.y, '#00ffff', 20);
                }

                // 총알과 적 충돌 체크
                bullets.forEach((b, bi) => {
                    if(b.x > e.x - 20 && b.x < e.x + 20 && b.y > e.y - 20 && b.y < e.y + 20) {
                        createExplosion(e.x, e.y, '#00ffff');
                        enemies.splice(ei, 1); bullets.splice(bi, 1);
                        score += 100;
                        document.getElementById('scoreDisplay').innerText = score;
                    }
                });

                if(e.y > canvas.height + 50) enemies.splice(ei, 1);
            });

            // 파티클 업데이트
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                p.alpha = p.life / 30;
                if(p.life <= 0) particles.splice(i, 1);
            });
        }

        function draw() {
            // 배경 그리기
            ctx.fillStyle = "#020202";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 별 그리기
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

            // 파티클 그리기
            particles.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1.0;

            if(isGameOver) {
                ctx.fillStyle = "white"; ctx.font = "50px Courier New";
                ctx.fillText("GAME OVER", 100, 320);
                ctx.fillStyle = "#0ff"; ctx.font = "25px Courier New";
                ctx.fillText("SCORE: " + score, 160, 370);
                ctx.fillStyle = "#f0f"; ctx.font = "20px Courier New";
                ctx.fillText("PRESS SPACE TO RESTART", 110, 420);
            } else {
                // 플레이어 그리기 (시안색 네온)
                drawShip(player.x, player.y, '#00ffff', true);
                
                // 총알 그리기
                ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
                ctx.fillStyle = '#fff';
                bullets.forEach(b => ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h));

                // 적 그리기 (마젠타색 네온)
                enemies.forEach(e => {
                    // 적은 그릴때 살짝 회전 효과
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle);
                    drawShip(0, 0, '#ff00ff', false);
                    ctx.restore();
                });
            }
            
            ctx.shadowBlur = 0;
            requestAnimationFrame(draw);
        }
        
        // 이미지 로딩 없이 바로 시작
        draw();
        setInterval(update, 1000/60); // 60 FPS 고정 업데이트
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Galactic Neon Survival</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: 'Segoe UI', sans-serif; }
        #gameCanvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); cursor: crosshair; }
        .ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <h2 id="score">Score: 0</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 500; canvas.height = 700;

        let score = 0;
        let isGameOver = false;
        let player = { x: 230, y: 620, w: 40, h: 40 };
        let bullets = [], enemies = [], particles = [];

        function createParticle(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 30, color });
            }
        }

        window.addEventListener("keydown", (e) => {
            if(isGameOver) location.reload(); // 게임 오버 시 아무 키나 누르면 재시작
            if(e.code === 'ArrowLeft' && player.x > 0) player.x -= 25;
            if(e.code === 'ArrowRight' && player.x < canvas.width - player.w) player.x += 25;
            if(e.code === 'Space') bullets.push({ x: player.x + 18, y: player.y, w: 4, h: 10 });
        });

        function update() {
            if(isGameOver) return;

            bullets.forEach((b, i) => {
                b.y -= 8;
                if(b.y < 0) bullets.splice(i, 1);
            });

            if(Math.random() < 0.03) enemies.push({ x: Math.random() * 460, y: -40, w: 35, h: 35 });
            
            enemies.forEach((e, ei) => {
                e.y += 3;
                
                // 충돌 체크 (플레이어와 적)
                if(e.x < player.x + player.w && e.x + e.w > player.x && e.y < player.y + player.h && e.y + e.h > player.y) {
                    isGameOver = true;
                }

                // 충돌 체크 (총알과 적)
                bullets.forEach((b, bi) => {
                    if(b.x < e.x+e.w && b.x+b.w > e.x && b.y < e.y+e.h && b.y+b.h > e.y) {
                        createParticle(e.x+15, e.y+15, '#ff0055');
                        enemies.splice(ei, 1); bullets.splice(bi, 1); score += 100;
                        document.getElementById('score').innerText = "Score: " + score;
                    }
                });

                if(e.y > canvas.height) enemies.splice(ei, 1);
            });

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if(isGameOver) {
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("GAME OVER", 130, 350);
                ctx.font = "20px Arial";
                ctx.fillText("Press any key to restart", 150, 400);
            } else {
                // 플레이어
                ctx.fillStyle = '#00f2ff';
                ctx.beginPath();
                ctx.moveTo(player.x + 20, player.y);
                ctx.lineTo(player.x, player.y + 40);
                ctx.lineTo(player.x + 40, player.y + 40);
                ctx.fill();

                // 총알
                ctx.fillStyle = '#fff';
                bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

                // 적
                ctx.fillStyle = '#ff0055';
                enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));

                // 파티클
                particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 3, 3);
                });
            }

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro Neon Annihilator</title>
    <style>
        body { margin: 0; background: #020202; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Orbitron', sans-serif; }
        canvas { border: 2px solid #444; box-shadow: 0 0 40px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 500; canvas.height = 700;

        let score = 0, isGameOver = false, shake = 0;
        let player = { x: 230, y: 620, w: 40, h: 40 };
        let bullets = [], enemies = [], stars = [], particles = [];

        // 별 배경 생성
        for(let i=0; i<100; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2 });

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 30, color });
            shake = 10;
        }

        window.addEventListener("keydown", (e) => {
            if(isGameOver) location.reload();
            if(e.code === 'ArrowLeft' && player.x > 0) player.x -= 25;
            if(e.code === 'ArrowRight' && player.x < canvas.width - player.w) player.x += 25;
            if(e.code === 'Space') bullets.push({ x: player.x + 18, y: player.y, w: 4, h: 12 });
        });

        function update() {
            if(isGameOver) return;
            if(shake > 0) shake--;

            // 별 이동
            stars.forEach(s => { s.y += 1; if(s.y > canvas.height) s.y = 0; });

            bullets.forEach((b, i) => { b.y -= 10; if(b.y < 0) bullets.splice(i, 1); });
            if(Math.random() < 0.04) enemies.push({ x: Math.random() * 460, y: -40, w: 30, h: 30 });
            
            enemies.forEach((e, ei) => {
                e.y += 4;
                if(e.x < player.x + player.w && e.x + 30 > player.x && e.y < player.y + player.h && e.y + 30 > player.y) isGameOver = true;
                bullets.forEach((b, bi) => {
                    if(b.x < e.x+30 && b.x+4 > e.x && b.y < e.y+30 && b.y+12 > e.y) {
                        createExplosion(e.x+15, e.y+15, '#00f2ff');
                        enemies.splice(ei, 1); bullets.splice(bi, 1); score += 100;
                    }
                });
                if(e.y > canvas.height) enemies.splice(ei, 1);
            });
        }

        function draw() {
            ctx.fillStyle = "#020202";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 흔들림 효과
            ctx.save();
            if(shake > 0) ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);

            // 별
            ctx.fillStyle = "white";
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

            if(isGameOver) {
                ctx.fillStyle = "white"; ctx.font = "40px Arial";
                ctx.fillText("MISSION FAILED", 100, 350);
            } else {
                // 플레이어 (네온 스타일)
                ctx.shadowBlur = 20; ctx.shadowColor = "#ff00ff";
                ctx.fillStyle = "#ff00ff";
                ctx.beginPath(); ctx.moveTo(player.x+20, player.y); ctx.lineTo(player.x, player.y+40); ctx.lineTo(player.x+40, player.y+40); ctx.fill();
                
                // 총알
                ctx.shadowColor = "#fff";
                ctx.fillStyle = "#fff";
                bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

                // 적 (메탈/네온 느낌)
                ctx.shadowColor = "#00f2ff";
                ctx.fillStyle = "#00f2ff";
                enemies.forEach(e => {
                    ctx.fillRect(e.x, e.y, e.w, e.h);
                    ctx.strokeRect(e.x-2, e.y-2, e.w+4, e.h+4);
                });
            }
            
            ctx.restore();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "white"; ctx.fillText("SCORE: " + score, 20, 40);
            
            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
